<!DOCTYPE html>
<html>
<head>
    <title>Edit Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <div class="card p-4 shadow">
        <h2 class="text-center mb-4">Edit Student</h2>

        <form action="/update/{{student[0]}}" method="POST">
            <input type="text" name="name" value="{{student[1]}}" class="form-control mb-3">
            <input type="email" name="email" value="{{student[2]}}" class="form-control mb-3">
            <input type="text" name="phone" value="{{student[3]}}" class="form-control mb-3">
            <input type="text" name="course" value="{{student[4]}}" class="form-control mb-3">
            <textarea name="address" class="form-control mb-3">{{student[5]}}</textarea>

            <button class="btn btn-success w-100">Update</button>
        </form>
    </div>
</div>

</body>
</html>
